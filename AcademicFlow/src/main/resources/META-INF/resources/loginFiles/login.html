<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edu Platform - Login</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/loginFiles/validationLogin.js"></script>
</head>

<body>
  <main class="page-center">
    <section class="stack">
      <h1>
        Продолжай заниматься <span class="marker">учебой</span><br />
        с нами
      </h1>
      <form class="form-card">
        <p id="error-message" style="color: #FF3B30; display: none;"></p>
        <div class="form-group">
          <label for="email">Почта</label>
          <input id="email" class="input-field" type="email" placeholder="mail@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input id="password" class="input-field" type="password" placeholder="********" />
        </div>
        <div class="form-group">
          <label for="group">Группа</label>
          <select id="group" class="input-field">
            <option value="" disabled selected>Выберите группу</option>
            <option value="IS-101">ИС-101</option>
            <option value="IS-102">ИС-102</option>
            <option value="AS-205">АС-205</option>
          </select>
        </div>


        <button type="submit" class="btn-primary">Войти</button>
        <p class="auth-footnote">
          Еще нет аккаунта? <a href="/registerFiles/register.html">Регистрация</a>
        </p>
      </form>
    </section>
  </main>
</body>

</html>
