<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edu Platform - Students</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/dashboard.js"></script>
    <script src="/teacherFilesFoldter/student_logic.js" defer></script>
</head>

<body>
    <header class="header">
        <a class="logo" href="/teacherFilesFoldter/dashboard_teacher.html">ACADEMIC FLOW</a>
        <nav class="nav">
            <a href="/teacherFilesFoldter/dashboard_teacher.html">Главная</a>

        <div class="profile">
            <span id="user-display-name"></span>

        <section>
            <h2>Прикрепленные студенты:</h2>

                Студенты, которые к вам прикреплены, чтобы вы давали им задания

                </div>
