<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edu Platform - Register</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/jsLogin&Register/validationRegistr.js"></script>
  </head>
  <body>
    <main class="page-center">
      <section class="stack">
        <h1>
          Регистрируйся и начинай <span class="marker">учиться</span>
        </h1>
        <form class="form-card" style="max-width: 540px">
          <div class="form-group">
            <label for="first-name">Имя</label>
            <input id="first-name" class="input-field" type="text" placeholder="Иван" />
          </div>
          <div class="form-group">
            <label for="last-name">Фамилия</label>
            <input id="last-name" class="input-field" type="text" placeholder="Иванов" />
          </div>
          <div class="form-group">
            <label for="email">Почта</label>
            <input id="email" class="input-field" type="email" placeholder="mail@example.com" />
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input id="password" class="input-field" type="password" placeholder="********" />
          </div>
          <button type="submit" class="btn-primary">Регистрация</button>
          <p class="auth-footnote">
            Уже есть аккаунт? <a href="login.html">Войти</a>
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
