<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edu Platform - Role Select</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <main class="page-center">
    <section class="stack">

      <h1>Выбери свою <span class="marker">роль</span> в приложении</h1>

      <p class="text-hint role-description">
        Ваша роль должна полностью совпадать с реальностью. Если вы ученик,
        то вы не сможете зарегистрироваться как преподаватель. Все заявки
        на роль преподавателя принимаются администратором.
      </p>


      <div class="role-buttons">
        <a id="teacher-card" class="btn-secondary" href="javascript:void(0)">Преподаватель</a>
        <a id="student-card" class="btn-primary" href="javascript:void(0)">Студент</a>
      </div>
      <p class="auth-footnote">Уже есть аккаунт? <a href="/loginFiles/login.html">Войти</a></p>
    </section>
  </main>
  <script src="roleSelection.js"></script>

</body>

</html>
